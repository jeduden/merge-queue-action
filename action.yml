name: merge-queue
description: >-
  Bors-style merge queue with batching and bisection. Performs merges
  locally via `git` so custom merge drivers take effect; set
  local_merge: false to fall back to server-side API merges.

inputs:
  token:
    description: >-
      GitHub token with contents:write, pull-requests:write,
      actions:write, and issues:write permissions
    required: true
  ci_workflow:
    description: >-
      Workflow file in this repository to run against the batch branch;
      must support workflow_dispatch (e.g. .github/workflows/ci.yml)
    required: true
  batch_size:
    description: Max PRs per batch
    default: "5"
  queue_label:
    description: Label that enqueues a PR
    default: queue
  dry_run:
    description: Log intent without mutating
    default: "false"
  local_merge:
    description: >-
      Perform merges locally via `git` in the runner (default) so
      custom merge drivers (.gitattributes + merge.<name>.driver) take
      effect. Requires `actions/checkout` with `fetch-depth: 0` and a
      token that can push to the repo to run before this action. Set
      to "false" to fall back to the server-side REST merges API
      (drivers are ignored in that mode).
    default: "true"
  batch_prs:
    description: >-
      JSON array of PR numbers for bisection (set automatically
      via workflow_dispatch, not intended for manual use)
    default: ""
  bisect:
    description: >-
      Run in bisect mode (set automatically via workflow_dispatch)
    default: "false"

runs:
  using: node24
  main: dist/index.js
