name: merge-queue
description: Bors-style merge queue with batching and bisection

inputs:
  token:
    description: >-
      GitHub token with contents:write and
      pull-requests:write
    required: true
  ci_workflow:
    description: >-
      Workflow file in this repository to run against the batch branch;
      must support workflow_dispatch (e.g. .github/workflows/ci.yml)
    required: true
  batch_size:
    description: Max PRs per batch
    default: "5"
  queue_label:
    description: Label that enqueues a PR
    default: queue
  dry_run:
    description: Log intent without mutating
    default: "false"

runs:
  using: composite
  steps:
    - name: Download merge-queue binary
      shell: bash
      env:
        VERSION: ${{ github.action_ref }}
        OWNER: ${{ github.action_repository }}
        RUNNER_OS_INPUT: ${{ runner.os }}
        RUNNER_ARCH_INPUT: ${{ runner.arch }}
      run: |
        case "${RUNNER_OS_INPUT}" in
          Linux)  OS="linux" ;;
          macOS)  OS="darwin" ;;
          *)
            echo "Unsupported runner.os: ${RUNNER_OS_INPUT}" >&2
            exit 1
            ;;
        esac

        case "${RUNNER_ARCH_INPUT}" in
          X64)   ARCH="amd64" ;;
          ARM64) ARCH="arm64" ;;
          *)
            echo "Unsupported runner.arch: ${RUNNER_ARCH_INPUT}" >&2
            exit 1
            ;;
        esac

        curl -fsSL -o merge-queue \
          "https://github.com/${OWNER}/releases/download/${VERSION}/merge-queue-${OS}-${ARCH}"
        chmod +x merge-queue
    - name: Run
      shell: bash
      env:
        MQ_TOKEN: ${{ inputs.token }}
        MQ_CI_WORKFLOW: ${{ inputs.ci_workflow }}
        MQ_BATCH_SIZE: ${{ inputs.batch_size }}
        MQ_QUEUE_LABEL: ${{ inputs.queue_label }}
        MQ_DRY_RUN: ${{ inputs.dry_run }}
      run: |
        ./merge-queue process \
          --token "${MQ_TOKEN}" \
          --ci-workflow "${MQ_CI_WORKFLOW}" \
          --batch-size "${MQ_BATCH_SIZE}" \
          --queue-label "${MQ_QUEUE_LABEL}" \
          --dry-run="${MQ_DRY_RUN}"
