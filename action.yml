name: merge-queue
description: >-
  Bors-style merge queue with batching and bisection.
  All git operations use the GitHub API server-side — no checkout needed.

inputs:
  token:
    description: >-
      GitHub token with contents:write, pull-requests:write,
      actions:write, and issues:write permissions
    required: true
  ci_workflow:
    description: >-
      Workflow file in this repository to run against the batch branch;
      must support workflow_dispatch (e.g. .github/workflows/ci.yml)
    required: true
  batch_size:
    description: Max PRs per batch
    default: "5"
  queue_label:
    description: Label that enqueues a PR
    default: queue
  dry_run:
    description: Log intent without mutating
    default: "false"
  batch_prs:
    description: >-
      JSON array of PR numbers for bisection (set automatically
      via workflow_dispatch, not intended for manual use)
    default: ""
  bisect:
    description: >-
      Run in bisect mode (set automatically via workflow_dispatch)
    default: "false"

runs:
  using: composite
  steps:
    - name: Download merge-queue binary
      shell: bash
      env:
        VERSION: ${{ github.action_ref }}
        OWNER: ${{ github.action_repository }}
        RUNNER_OS_INPUT: ${{ runner.os }}
        RUNNER_ARCH_INPUT: ${{ runner.arch }}
      run: |
        case "${RUNNER_OS_INPUT}" in
          Linux)  OS="linux" ;;
          macOS)  OS="darwin" ;;
          *)
            echo "Unsupported runner.os: ${RUNNER_OS_INPUT}" >&2
            exit 1
            ;;
        esac

        case "${RUNNER_ARCH_INPUT}" in
          X64)   ARCH="amd64" ;;
          ARM64) ARCH="arm64" ;;
          *)
            echo "Unsupported runner.arch: ${RUNNER_ARCH_INPUT}" >&2
            exit 1
            ;;
        esac

        ASSET="merge-queue-${OS}-${ARCH}"
        RELEASE_URL="https://github.com/${OWNER}/releases/download/${VERSION}"

        curl -fsSL -o merge-queue "${RELEASE_URL}/${ASSET}"
        curl -fsSL -o checksums.txt "${RELEASE_URL}/checksums.txt"

        EXPECTED="$(grep "${ASSET}" checksums.txt | awk '{print $1}')"
        if [ -z "${EXPECTED}" ]; then
          echo "No checksum found for ${ASSET}" >&2
          exit 1
        fi

        case "${RUNNER_OS_INPUT}" in
          Linux) ACTUAL="$(sha256sum merge-queue | awk '{print $1}')" ;;
          macOS) ACTUAL="$(shasum -a 256 merge-queue | awk '{print $1}')" ;;
        esac

        if [ "${ACTUAL}" != "${EXPECTED}" ]; then
          echo "SHA-256 mismatch: expected ${EXPECTED}, got ${ACTUAL}" >&2
          exit 1
        fi

        chmod +x merge-queue
    - name: Run
      shell: bash
      env:
        MQ_TOKEN: ${{ inputs.token }}
        MQ_CI_WORKFLOW: ${{ inputs.ci_workflow }}
        MQ_BATCH_SIZE: ${{ inputs.batch_size }}
        MQ_QUEUE_LABEL: ${{ inputs.queue_label }}
        MQ_DRY_RUN: ${{ inputs.dry_run }}
        MQ_BISECT: ${{ inputs.bisect }}
        INPUT_BATCH_PRS: ${{ inputs.batch_prs }}
      run: |
        if [ "${MQ_BISECT}" = "true" ]; then
          ./merge-queue bisect \
            --token "${MQ_TOKEN}" \
            --ci-workflow "${MQ_CI_WORKFLOW}" \
            --queue-label "${MQ_QUEUE_LABEL}" \
            --dry-run="${MQ_DRY_RUN}"
        else
          ./merge-queue process \
            --token "${MQ_TOKEN}" \
            --ci-workflow "${MQ_CI_WORKFLOW}" \
            --batch-size "${MQ_BATCH_SIZE}" \
            --queue-label "${MQ_QUEUE_LABEL}" \
            --dry-run="${MQ_DRY_RUN}"
        fi
