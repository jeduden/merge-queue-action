name: merge-queue
description: >-
  Bors-style merge queue with batching and bisection. Merges PRs into
  the batch branch locally via `git merge` so custom merge drivers
  (.gitattributes + merge.<name>.driver) take effect. The action
  configures git identity and rewrites `origin` to use the supplied
  token, so the only workflow-side step required before it is
  `actions/checkout` with `fetch-depth: 0`.

inputs:
  token:
    description: >-
      GitHub token with contents:write, pull-requests:write,
      actions:write, and issues:write permissions
    required: true
  ci_workflow:
    description: >-
      Workflow file in this repository to run against the batch branch;
      must support workflow_dispatch (e.g. .github/workflows/ci.yml)
    required: true
  batch_size:
    description: Max PRs per batch
    default: "5"
  queue_label:
    description: Label that enqueues a PR
    default: queue
  dry_run:
    description: Log intent without mutating
    default: "false"
  batch_prs:
    description: >-
      JSON array of PR numbers for bisection (set automatically
      via workflow_dispatch, not intended for manual use)
    default: ""
  bisect:
    description: >-
      Run in bisect mode (set automatically via workflow_dispatch)
    default: "false"
  git_user_email:
    description: >-
      Email used for the merge commit author/committer. Set on the
      local repo via `git config user.email` before merging.
    default: merge-queue@users.noreply.github.com
  git_user_name:
    description: >-
      Name used for the merge commit author/committer. Set on the
      local repo via `git config user.name` before merging.
    default: merge-queue-bot

runs:
  using: node24
  main: dist/index.js
