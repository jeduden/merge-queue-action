name: Prepare Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.2.0)"
        required: true
        type: string

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${VERSION} (expected vX.Y.Z)" >&2
            exit 1
          fi

      - name: Update README version reference
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s|jeduden/merge-queue-action@v[0-9][0-9.]*|jeduden/merge-queue-action@${VERSION}|g" README.md

      - name: Commit, tag, and push
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          if git diff --quiet README.md; then
            echo "README already references ${VERSION}"
          else
            git add README.md
            git commit -m "Update README action reference to ${VERSION}"
          fi

          git tag "${VERSION}"
          git push origin main "${VERSION}"
